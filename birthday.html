<!-- Replace your window.onload script with this -->
<script>
  // Tailwind script already loaded

  function createBalloons() {
    const container = document.getElementById('balloons');
    for (let i = 0; i < 25; i++) {
      const balloon = document.createElement('div');
      balloon.className = 'balloon';
      balloon.style.left = Math.random() * 100 + 'vw';
      balloon.style.animationDuration = (Math.random() * 6 + 7) + 's';
      balloon.style.opacity = Math.random() * 0.7 + 0.4;
      balloon.style.background = `radial-gradient(circle at 30% 20%, #fff, ${['#ff69b4', '#ff1493', '#db2777', '#c026d3'][Math.floor(Math.random()*4)]})`;
      container.appendChild(balloon);
      
      setTimeout(() => {
        balloon.remove();
      }, 15000);
    }
  }

  // Confetti
  function launchConfetti() {
    const colors = ['#ff69b4', '#ff1493', '#c026d3', '#ffffff'];
    for (let i = 0; i < 80; i++) {
      setTimeout(() => {
        const confetti = document.createElement('div');
        confetti.style.position = 'absolute';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.top = '-10px';
        confetti.style.width = '12px';
        confetti.style.height = '12px';
        confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.opacity = Math.random() + 0.5;
        confetti.style.zIndex = '50';
        document.getElementById('confetti').appendChild(confetti);

        const duration = Math.random() * 4 + 3;
        confetti.animate([
          { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
          { transform: `translateY(${window.innerHeight + 100}px) rotate(${Math.random() * 800}deg)`, opacity: 0 }
        ], {
          duration: duration * 1000,
          easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
        });

        setTimeout(() => confetti.remove(), duration * 1000 + 1000);
      }, i * 8);
    }
  }

  function goToPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    
    const target = document.getElementById(`page${page}`);
    target.classList.remove('hidden');
    
    if (page === 1) createBalloons();
    if (page === 3) launchConfetti();
  }

  // Auto update name
  document.getElementById('nameInput').addEventListener('input', function() {
    document.getElementById('nameDisplay').textContent = this.value || "Saman";
  });

  // Music autoplay fix
  function playMusic() {
    const music = document.getElementById('bgMusic');
    music.play().catch(() => {});
  }

  document.addEventListener('click', playMusic);

  // Initialize
  window.onload = () => {
    createBalloons();
    document.getElementById('page1').classList.remove('hidden');
    playMusic();
  };
</script>
